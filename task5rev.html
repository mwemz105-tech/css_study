<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .container {
            background-color: aqua;
            margin: 30px 10px;
            border-radius: 10px;
            color: white;
            padding: 10px;
        }

        .container .nav {
            display: flex;
            justify-content: space-between;
        }

        .container .nav a {
            color: white;
            text-decoration: none;
        }

        .container .nav .first {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .container .content {
            display: flex;
            justify-content: space-between;

        }

        .container .content .text {
            width: 300px;
            margin: 40px 90px;
        }

        .container .content .image {
            margin: 60px 60px 0 0;

        } 
        .container .content .text p{
            margin: 0 0 15px 30px;
        }
        .container .content .text button{
            margin: 0 0 0 30px;
            background-color: skyblue;
            color: white;
            padding: 5px 15px;
            border-radius: 10px;
            border: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="nav">
            <ul class="first">
                <li><a href=""><i class="fa-solid fa-bars-staggered" style="color: white;"></i></a></li>
                <li><a href="">Home</a></li>
                <li><a href="">Service</a></li>
                <li><a href="">About</a></li>
            </ul>
            <ul class="second">
                <li><a href="">Contact us</a></li>

            </ul>

        </div>
        <div class="content">
            <div class="text">
                <h1>Simple <br>Web Design</h1>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quos quaerat enim assumenda perferendis
                    accusamus accusantium tenetur dolore inventore, qui perspiciatis.</p>
                <a href=""><button>Portfolio</button></a>
            </div>
            <div class="image">
                <img src="image loveting.jpg" alt="hero image" height="200px" width="200px">

            </div>
        </div>

    </div>

</body>

</html>
